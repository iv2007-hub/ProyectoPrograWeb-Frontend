<div class="dashboard-container">
  <div class="header">
    <h1>DonaCerca</h1>
    <button mat-raised-button color="warn" (click)="onLogout()">Cerrar Sesión</button>
  </div>

  <mat-tab-group>

    <mat-tab label="Mis Publicaciones">
      <div class="tab-content">
        <div *ngIf="isLoading">Cargando...</div>
        <div *ngIf="errorMessage">{{ errorMessage }}</div>

        <div *ngIf="!isLoading && myDonations.length === 0">No tienes publicaciones.</div>

        <mat-card *ngFor="let post of myDonations" class="donation-card">
          <mat-card-header>
            <mat-card-title>{{ post.itemName }}</mat-card-title>
            <mat-card-subtitle>{{ post.categoryName }} · {{ post.zone }} · <strong>{{ post.status }}</strong></mat-card-subtitle>
            <button mat-icon-button [matMenuTriggerFor]="menu" style="margin-left:auto">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="onEditarPublicacion(post)">
                <mat-icon>edit</mat-icon> Editar
              </button>
              <button mat-menu-item (click)="onEliminarPublicacion(post.id)">
                <mat-icon>delete</mat-icon> Eliminar
              </button>
            </mat-menu>
          </mat-card-header>
          <mat-card-content>
            <p>{{ post.description }}</p>
            <p><strong>Estado:</strong> {{ post.itemCondition }}</p>

            <!-- Solicitudes recibidas -->
            <div *ngIf="requestsByPost[post.id] && requestsByPost[post.id].length > 0">
              <h4>Solicitudes recibidas:</h4>
              <div *ngFor="let req of requestsByPost[post.id]">
                <p>{{ req.receiverName }} — {{ req.status }}
                  <button mat-button color="primary"
                          *ngIf="req.status === 'pendiente' && post.status === 'Disponible'"
                          (click)="onAceptarSolicitud(post.id, req.id)">
                    Aceptar
                  </button>
                </p>
              </div>
            </div>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="accent"
                    *ngIf="post.status === 'Reservado'"
                    (click)="onCoordinarEntrega(post.id)">
              Coordinar Entrega
            </button>
            <button mat-button color="primary"
                    *ngIf="post.status === 'Reservado'"
                    (click)="onConfirmarEntrega(post.id)">
              Confirmar Entrega
            </button>
          </mat-card-actions>
        </mat-card>
      </div>
    </mat-tab>

  </mat-tab-group>
  <button mat-fab color="primary"
          style="position:fixed; bottom:24px; right:24px;"
          (click)="onCrearPublicacion()">
    <mat-icon>add</mat-icon>
  </button>
</div>
